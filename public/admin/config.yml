backend:
  name: github
  branch: main
  repo: Max287954/restauraceufintu
  base_url: https://restauraceufintu.pages.dev

local_backend: true

media_folder: "public/images"
public_folder: "/images"

locale: "cs"

collections:
  - name: "weekly-menu"
    label: "Denní menu (Týdenní)"
    folder: "src/content/weekly-menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Týden (např. 15.6. - 19.6.)", name: "title", widget: "string" }
      - label: "Dny v týdnu"
        name: "days"
        widget: "list"
        fields:
          - { label: "Den (např. Pondělí)", name: "day_name", widget: "string" }
          - label: "Polévka"
            name: "soup"
            widget: "object"
            required: false
            fields:
              - { label: "Název polévky", name: "name", widget: "string" }
              - { label: "Cena (Kč)", name: "price", widget: "number", value_type: "int" }
          - label: "Hlavní chody"
            name: "mains"
            widget: "list"
            fields:
              - { label: "Název jídla", name: "name", widget: "string" }
              - { label: "Cena (Kč)", name: "price", widget: "number", value_type: "int" }
              - { label: "Alergeny", name: "allergens", widget: "string", required: false }

  - name: "menu"
    label: "Jídelní lístek"
    folder: "src/content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Kategorie",
          name: "category",
          widget: "select",
          options: ["polevky", "hlavni-jidla", "dezerty", "napoje"],
        }
      - { label: "Název", name: "name", widget: "string" }
      - { label: "Popis", name: "description", widget: "text", required: false }
      - { label: "Cena (Kč)", name: "price", widget: "number", value_type: "int" }
      - { label: "Alergeny", name: "allergens", widget: "string", required: false }
      - { label: "Pořadí", name: "order", widget: "number", default: 0, value_type: "int" }

site_url: "https://restauraceufintu.cz"
display_url: "https://restauraceufintu.cz"
logo_url: "https://restauraceufintu.cz/favicon.svg"
